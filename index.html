    ];
    const navItems=[["/","Home"],["/shop","Shop"],["/wishlist","Wishlist"],["/cart","Cart"],["/checkout","Checkout"]];
    let state=loadState();
    function loadState(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY)||"{}");return{cart:s.cart||{},wishlist:s.wishlist||[]}}catch{return{cart:{},wishlist:[]}}}
    function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state));updateBadges()}
    function money(v){return new Intl.NumberFormat("th-TH",{style:"currency",currency:"THB",maximumFractionDigits:0}).format(v)}
    function getProduct(id){return products.find(p=>p.id===id)}
    function cartItems(){return Object.entries(state.cart).map(([id,qty])=>({product:getProduct(id),qty})).filter(i=>i.product&&i.qty>0)}
    function cartTotal(){return cartItems().reduce((s,i)=>s+i.product.price*i.qty,0)}
    function cartCount(){return cartItems().reduce((s,i)=>s+i.qty,0)}
    function route(){const hash=window.location.hash||"#/";const clean=hash.replace(/^#/,"")||"/";return{path:clean,parts:clean.split("?")[0].split("/").filter(Boolean)}}
    function setRoute(path){window.location.hash=path}
    function escapeHtml(v){return String(v).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}
    function art(p,large=false){const label=`${p.brand}\n${p.name}`;return p.image?`<div class="product-art${large?" large":""}"><img src="${p.image}" alt="${escapeHtml(p.name)}" onerror="this.remove();this.parentElement.textContent='${escapeHtml(label)}';"></div>`:`<div class="product-art${large?" large":""}">${escapeHtml(label)}</div>`}
    function renderNav(){const cur=route().path;navLinks.innerHTML=navItems.map(([p,l])=>`<a class="${cur===p||(p!=="/"&&cur.startsWith(p))?"active":""}" href="#${p}">${l}</a>`).join("");updateBadges()}
    function updateBadges(){cartCountEl.textContent=cartCount();wishCount.textContent=state.wishlist.length}
    const cartCountEl=document.getElementById("cartCount");
    function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove("show"),1800)}
    function addToCart(id,qty=1){state.cart[id]=(state.cart[id]||0)+qty;saveState();toast("เพิ่มสินค้าเข้าตะกร้าแล้ว")}
    function setQty(id,qty){if(qty<=0)delete state.cart[id];else state.cart[id]=qty;saveState();render()}
    function toggleWishlist(id){state.wishlist=state.wishlist.includes(id)?state.wishlist.filter(x=>x!==id):[...state.wishlist,id];saveState();render()}
    function card(p){const wished=state.wishlist.includes(p.id);return`<article class="product-card"><a href="#/product/${p.id}">${art(p)}</a><div class="product-body"><div class="meta">${escapeHtml(p.brand)}</div><h3><a href="#/product/${p.id}">${escapeHtml(p.name)}</a></h3><p>${escapeHtml(p.summary)}</p><div class="tag-row"><span class="tag">${escapeHtml(p.color)}</span><span class="tag">${escapeHtml(p.material)}</span></div><div class="price">${money(p.price)}</div><div class="row-actions"><button class="primary" data-add="${p.id}">Add to cart</button><button class="secondary" data-wish="${p.id}">${wished?"Remove wishlist":"Wishlist"}</button></div></div></article>`}
    function home(){const brands=[...new Set(products.map(p=>p.brand))];return`<div class="wrap"><section class="hero"><div class="hero-copy"><div class="eyebrow">Ready-to-order luxury bags</div><h1>Luxury Bags Collection</h1><p class="lead">เลือกกระเป๋าแบรนด์ดัง ใส่ตะกร้า แล้วส่งออเดอร์ผ่าน LINE เพื่อให้ร้านติดต่อกลับและปิดการขายได้ทันที.</p><div class="hero-buttons"><a class="primary" href="#/shop">Shop collection</a><a class="secondary" href="#/checkout">Checkout via LINE</a></div></div><a class="hero-media" href="#/product/lv-trunk-pm"><img src="${heroImage}" alt="Louis Vuitton Trunk Bag"></a></section><section><div class="section-head"><div><h2>Featured Brands</h2><p>แบรนด์หลักที่ลูกค้าค้นหาได้เร็ว พร้อมสินค้าตัวอย่างสำหรับเริ่มใช้งานทันที.</p></div></div><div class="brand-grid">${brands.map(b=>`<button class="brand-tile" data-brand="${b}"><strong>${b}</strong><span>View collection</span></button>`).join("")}</div></section><section><div class="section-head"><div><h2>Featured Products</h2><p>ชุดสินค้าตัวอย่างพร้อม flow สั่งซื้อจริงผ่าน LINE.</p></div><a class="secondary" href="#/shop">View all</a></div><div class="product-grid">${products.slice(0,3).map(card).join("")}</div></section></div>`}
    function shop(){const params=new URLSearchParams((route().path.split("?")[1]||""));const brand=params.get("brand")||"all";const q=(params.get("q")||"").toLowerCase();const brands=["all",...new Set(products.map(p=>p.brand))];const filtered=products.filter(p=>(brand==="all"||p.brand===brand)&&`${p.brand} ${p.name} ${p.summary}`.toLowerCase().includes(q));return`<div class="wrap"><div class="section-head"><div><h2>Shop</h2><p>ค้นหา กรองแบรนด์ แล้วเพิ่มสินค้าเข้าตะกร้าได้จากหน้านี้.</p></div></div><div class="filters"><input id="searchBox" type="search" placeholder="Search bags or brands" value="${escapeHtml(q)}"><select id="brandFilter">${brands.map(b=>`<option value="${b}" ${b===brand?"selected":""}>${b==="all"?"All brands":b}</option>`).join("")}</select></div><div class="product-grid">${filtered.length?filtered.map(card).join(""):`<div class="panel empty">ไม่พบสินค้า</div>`}</div></div>`}
    function detail(id){const p=getProduct(id)||products[0];const wished=state.wishlist.includes(p.id);return`<div class="wrap"><p class="meta"><a href="#/shop">Shop</a> / ${escapeHtml(p.brand)}</p><section class="detail">${art(p,true)}<div class="detail-info"><div><div class="eyebrow">${escapeHtml(p.brand)}</div><h1>${escapeHtml(p.name)}</h1></div><p class="lead">${escapeHtml(p.summary)}</p><div class="price">${money(p.price)}</div><div class="specs"><div><span>Color</span><strong>${escapeHtml(p.color)}</strong></div><div><span>Material</span><strong>${escapeHtml(p.material)}</strong></div><div><span>Ordering</span><strong>LINE checkout</strong></div><div><span>Availability</span><strong>Sample stock</strong></div></div><div class="panel"><h3>Details</h3><ul>${p.details.map(d=>`<li>${escapeHtml(d)}</li>`).join("")}</ul></div><div class="row-actions"><button class="primary" data-add="${p.id}">Add to cart</button><button class="secondary" data-wish="${p.id}">${wished?"Remove wishlist":"Add to wishlist"}</button><a class="secondary" href="#/checkout">Checkout</a></div></div></section></div>`}
    function wishlistView(){const list=state.wishlist.map(getProduct).filter(Boolean);return`<div class="wrap"><div class="section-head"><div><h2>Wishlist</h2><p>รายการที่ลูกค้าสนใจ เก็บไว้ใน browser นี้และยังอยู่หลัง refresh.</p></div></div>${list.length?`<div class="product-grid">${list.map(card).join("")}</div>`:`<div class="panel empty">ยังไม่มีสินค้าใน wishlist <br><br><a class="primary" href="#/shop">เลือกสินค้า</a></div>`}</div>`}
    function summary(extra=""){const items=cartItems();return`<aside class="summary-box"><h3>Order Summary</h3>${items.map(({product,qty})=>`<div class="summary-line"><span>${escapeHtml(product.name)} x ${qty}</span><strong>${money(product.price*qty)}</strong></div>`).join("")}<div class="summary-line"><span>Total</span><strong>${money(cartTotal())}</strong></div><br>${extra}</aside>`}
    function cart(){const items=cartItems();return`<div class="wrap"><div class="section-head"><div><h2>Cart</h2><p>ปรับจำนวนสินค้าแล้วไป checkout เพื่อส่งออเดอร์ผ่าน LINE.</p></div></div>${items.length?`<div class="checkout-grid"><div class="cart-list">${items.map(({product,qty})=>`<div class="cart-row">${art(product)}<div><div class="meta">${escapeHtml(product.brand)}</div><h3>${escapeHtml(product.name)}</h3><div class="price">${money(product.price)}</div></div><div class="row-actions"><div class="qty"><button data-qty="${product.id}" data-delta="-1">-</button><strong>${qty}</strong><button data-qty="${product.id}" data-delta="1">+</button></div><button class="danger" data-remove="${product.id}">Remove</button></div></div>`).join("")}</div>${summary(`<a class="primary" href="#/checkout">Proceed to checkout</a>`)}</div>`:`<div class="panel empty">ตะกร้ายังว่าง <br><br><a class="primary" href="#/shop">เลือกสินค้า</a></div>`}</div>`}
    function checkout(){const items=cartItems();return`<div class="wrap"><div class="section-head"><div><h2>Checkout</h2><p>กรอกข้อมูลลูกค้า ระบบจะสร้างข้อความออเดอร์และเปิด LINE ให้ส่งหาร้าน.</p></div></div>${items.length?`<div class="checkout-grid"><section class="form-box"><form class="form" id="checkoutForm"><div class="field"><label for="customerName">Name</label><input id="customerName" required placeholder="ชื่อลูกค้า"></div><div class="field"><label for="customerPhone">Phone</label><input id="customerPhone" required inputmode="tel" placeholder="เบอร์โทร"></div><div class="field"><label for="customerAddress">Address</label><textarea id="customerAddress" required placeholder="ที่อยู่จัดส่ง"></textarea></div><div class="field"><label for="customerNote">Note</label><textarea id="customerNote" placeholder="สี/รุ่น/เวลาติดต่อ หรือรายละเอียดเพิ่มเติม"></textarea></div><button class="primary" type="submit">Send order to LINE</button><p class="meta">LINE target is currently a placeholder. Replace LINE_TARGET_URL or LINE_ID in index.html before real launch.</p></form></section>${summary()}</div>`:`<div class="panel empty">ไม่มีสินค้าในตะกร้า <br><br><a class="primary" href="#/shop">เลือกสินค้า</a></div>`}</div>`}
    function lineMessage(form){return["New order from Luxury Bags Collection","",...cartItems().map(({product,qty})=>`- ${product.brand} ${product.name} x ${qty}: ${money(product.price*qty)}`),"",`Total: ${money(cartTotal())}`,"",`Name: ${form.customerName.value.trim()}`,`Phone: ${form.customerPhone.value.trim()}`,`Address: ${form.customerAddress.value.trim()}`,`Note: ${form.customerNote.value.trim()||"-"}`].join("\n")}
    function lineUrl(msg){const e=encodeURIComponent(msg);if(LINE_TARGET_URL)return`${LINE_TARGET_URL}${LINE_TARGET_URL.includes("?")?"&":"?"}text=${e}`;if(LINE_ID&&LINE_ID!=="ใส่ภายหลัง")return`https://line.me/R/ti/p/~${encodeURIComponent(LINE_ID)}?text=${e}`;return`https://line.me/R/share?text=${e}`}
    function bind(){document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>addToCart(b.dataset.add));document.querySelectorAll("[data-wish]").forEach(b=>b.onclick=()=>toggleWishlist(b.dataset.wish));document.querySelectorAll("[data-remove]").forEach(b=>b.onclick=()=>setQty(b.dataset.remove,0));document.querySelectorAll("[data-qty]").forEach(b=>b.onclick=()=>setQty(b.dataset.qty,(state.cart[b.dataset.qty]||0)+Number(b.dataset.delta)));document.querySelectorAll("[data-brand]").forEach(b=>b.onclick=()=>setRoute(`/shop?brand=${encodeURIComponent(b.dataset.brand)}`));const s=document.getElementById("searchBox"),f=document.getElementById("brandFilter");if(s&&f){const apply=()=>{const p=new URLSearchParams();if(f.value!=="all")p.set("brand",f.value);if(s.value.trim())p.set("q",s.value.trim());setRoute(`/shop${p.toString()?`?${p}`:""}`)};f.onchange=apply;s.onkeydown=e=>{if(e.key==="Enter")apply()}}const form=document.getElementById("checkoutForm");if(form)form.onsubmit=e=>{e.preventDefault();if(!cartItems().length)return;window.open(lineUrl(lineMessage(form)),"_blank","noopener,noreferrer");toast("สร้างข้อความออเดอร์สำหรับ LINE แล้ว")}}
    function render(){renderNav();const [first,second]=route().parts;let html;if(!first)html=home();else if(first==="shop")html=shop();else if(first==="product")html=detail(second);else if(first==="wishlist")html=wishlistView();else if(first==="cart")html=cart();else if(first==="checkout")html=checkout();else html=`<div class="wrap"><div class="panel empty"><h2>Page not found</h2><p>กลับไปเลือกสินค้าได้ที่หน้าร้าน</p><br><a class="primary" href="#/shop">Go to shop</a></div></div>`;app.innerHTML=html;bind();updateBadges();window.scrollTo({top:0,behavior:"instant"})}
    window.addEventListener("hashchange",render);if(!location.hash)location.hash="#/";render();
  </script>
</body>
</html>
