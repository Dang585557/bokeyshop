<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luxury Bags Collection</title>
  <meta name="description" content="Luxury bags store with cart, wishlist, and LINE checkout." />
  <style>
    :root {
      --ink: #181614;
      --muted: #68615a;
      --line: #e4ddd3;
      --paper: #fffaf3;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --gold: #b7791f;
      --soft: #f3eee6;
      --danger: #b91c1c;
      --shadow: 0 12px 32px rgba(30, 24, 16, .1);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;        
       }
      a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

.shell { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 250, 243, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
    }
.brand { display: inline-flex; flex-direction: column; min-width: 160px; }
    .brand strong { font-size: 18px; }
    .brand span { font-size: 12px; color: var(--muted); }
    .links { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .links a, .icon-btn, .primary, .secondary, .danger, .qty button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      min-height: 40px;
      padding: 9px 12px;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }
    .links a.active, .links a:hover, .icon-btn:hover, .secondary:hover {
      border-color: #cdbfad;
      background: #fff;
    }
    .actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .icon-btn { position: relative; min-width: 42px; display: inline-flex; align-items: center; justify-content: center; }
    .badge {
      position: absolute;
      top: -7px;
      right: -7px;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }
    main { flex: 1; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 26px 18px 44px; }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(280px, .92fr);
      min-height: 430px;
      align-items: stretch;
      gap: 24px;
    }
    .hero-copy { padding: 42px 0; display: flex; flex-direction: column; justify-content: center; gap: 18px; }
    .eyebrow { color: var(--gold); text-transform: uppercase; font-weight: 700; font-size: 12px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(38px, 6vw, 68px); line-height: 1.02; max-width: 760px; }
    h2 { font-size: clamp(26px, 4vw, 40px); line-height: 1.12; }
    h3 { font-size: 19px; line-height: 1.25; }
    .lead { color: var(--muted); font-size: 18px; max-width: 650px; }
    .hero-media {
      min-height: 360px;
      border-radius: 8px;
      overflow: hidden;
      background: #161310;
      position: relative;
      box-shadow: var(--shadow);
    }
    .hero-media img { width: 100%; height: 100%; object-fit: cover; }
    .hero-media::after {
      content: "Louis Vuitton Trunk Bag";
      position: absolute;
      left: 18px;
      bottom: 18px;
      color: white;
      background: rgba(0,0,0,.5);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    .hero-buttons, .row-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 700;
    }
    .primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); transform: translateY(-1px); }
    .secondary { font-weight: 700; }
    .danger { color: var(--danger); border-color: #f1c9c9; background: #fff7f7; }
    .danger:hover { background: #fee2e2; }

    .section-head { display: flex; justify-content: space-between; gap: 16px; align-items: end; margin: 34px 0 18px; }
    .section-head p { color: var(--muted); max-width: 560px; }
    .brand-grid, .product-grid { display: grid; gap: 14px; }
    .brand-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .brand-tile, .product-card, .panel, .cart-row, .summary-box, .form-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 4px 18px rgba(30, 24, 16, .05);
 }
    .brand-tile { padding: 18px; min-height: 96px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
    .brand-tile span { color: var(--muted); font-size: 13px; }
    .product-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .product-card { overflow: hidden; display: flex; flex-direction: column; min-height: 100%; }
    .product-art {
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #f6efe4, #d7c4aa 55%, #fbf8f1);
      display: grid;
      place-items: center;
      color: #5c4630;
      font-weight: 800;
      text-align: center;
      padding: 22px;
      position: relative;
      white-space: pre-line;
    }
    .product-art img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .product-body { padding: 16px; display: flex; flex-direction: column; gap: 11px; flex: 1; }
    .meta { color: var(--muted); font-size: 13px; }
    .price { font-weight: 800; color: var(--accent-dark); }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { border: 1px solid var(--line); background: var(--soft); border-radius: 999px; padding: 4px 8px; font-size: 12px; color: #594f47; }
    .filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 14px 0 20px; }
    .filters input, .filters select, .field input, .field textarea {
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      min-height: 42px;
      padding: 10px 12px;
      color: var(--ink);
    }
    .filters input { flex: 1; min-width: 220px; }
    .filters select { min-width: 170px; }

    .detail { display: grid; grid-template-columns: minmax(280px, .92fr) minmax(0, 1.08fr); gap: 24px; align-items: start; }
    .detail .product-art { border-radius: 8px; min-height: 420px; }
    .detail-info { display: flex; flex-direction: column; gap: 18px; }
    .detail-info .lead { font-size: 16px; }
    .specs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .specs div { padding: 12px; background: var(--soft); border-radius: 8px; border: 1px solid var(--line); }
    .specs span { display: block; color: var(--muted); font-size: 12px; }

    .cart-list { display: grid; gap: 12px; }
    .cart-row { padding: 14px; display: grid; grid-template-columns: 88px 1fr auto; gap: 14px; align-items: center; }
    .cart-row .product-art { width: 88px; aspect-ratio: 1; border-radius: 8px; font-size: 12px; }
    .qty { display: inline-flex; align-items: center; gap: 8px; }
    .qty button { min-width: 36px; min-height: 36px; padding: 4px 9px; }
    .checkout-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 22px; align-items: start; }
    .form-box, .summary-box, .panel { padding: 18px; }
    .form { display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-weight: 700; font-size: 14px; }
    .field textarea { min-height: 96px; resize: vertical; }
    .summary-line { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--line); }
    .summary-line:last-child { border-bottom: 0; font-weight: 800; font-size: 18px; }
    .empty { padding: 34px; text-align: center; color: var(--muted); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: #161310;
      color: white;
      border-radius: 8px;
      padding: 12px 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 30;
    }
   .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { border-top: 1px solid var(--line); padding: 26px 18px; color: var(--muted); text-align: center; }

    @media (max-width: 860px) {
      .nav { grid-template-columns: 1fr; align-items: stretch; }
      .links { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; }
      .actions { justify-content: flex-start; }
      .hero, .detail, .checkout-grid { grid-template-columns: 1fr; }
      .hero-copy { padding: 24px 0 0; }
      .brand-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cart-row { grid-template-columns: 72px 1fr; }
      .cart-row > .row-actions { grid-column: 1 / -1; }
    }
    @media (max-width: 560px) {
      .wrap { padding: 18px 14px 34px; }
      .product-grid, .brand-grid, .specs { grid-template-columns: 1fr; }
      .section-head { align-items: start; flex-direction: column; }
      .links a { white-space: nowrap; }
      .hero-media { min-height: 280px; }
      .row-actions .primary, .row-actions .secondary, .row-actions .danger { width: 100%; justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <nav class="nav" aria-label="Main navigation">
        <a class="brand" href="#/">
          <strong>Luxury Bags</strong>
          <span>Curated designer collection</span>
        </a>
        <div class="links" id="navLinks"></div>
        <div class="actions">
          <a class="icon-btn" href="#/wishlist" title="Wishlist" aria-label="Wishlist">♡<span class="badge" id="wishCount">0</span></a>
          <a class="icon-btn" href="#/cart" title="Cart" aria-label="Cart">Bag<span class="badge" id="cartCount">0</span></a>
        </div>
      </nav>
    </header>
    <main id="app"></main>
    <footer>
      Luxury Bags Collection - Static demo store for GitHub Pages - Set LINE_TARGET_URL in the script before real launch.
    </footer>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
    const LINE_TARGET_URL = "";
    const LINE_ID = "ใส่ภายหลัง";
    const STORE_KEY = "luxury-bags-store-v1";
const products = [
      {
        id: "lv-trunk-pm",
        brand: "Louis Vuitton",
        name: "Trunk PM Monogram",
        price: 189000,
        color: "Monogram Brown",
        material: "Canvas and leather trim",
        image: "./images/products/louis-vuitton/lv-trunk-bag.jpg",
        summary: "Structured mini trunk silhouette with polished hardware and a compact day-to-night profile.",
        details: ["Signature trunk lock", "Detachable strap", "Dust bag included"]
      },
      {
        id: "gucci-marmont-small",
        brand: "Gucci",
        name: "GG Marmont Small Shoulder Bag",
        price: 96500,
        color: "Black",
        material: "Matelasse leather",
        image: "",
        summary: "Soft quilted shoulder bag with antique gold-tone GG hardware and chain strap.",
        details: ["Chain shoulder strap", "Interior slip pocket", "Made in Italy"]
      },
      {
        id: "dior-book-tote",
        brand: "Dior",
        name: "Book Tote Medium",
        price: 128000,
        color: "Blue Oblique",
        material: "Embroidered canvas",
        image: "",
        summary: "Roomy embroidered tote designed for daily carry, travel, and polished styling.",
        details: ["Top handles", "Spacious interior", "Signature motif"]
      },
      {
        id: "chanel-classic-flap",
        brand: "Chanel",
        name: "Classic Double Flap",
        price: 325000,
        color: "Beige Clair",
        material: "Lambskin leather",
        image: "",
        summary: "Timeless flap bag with diamond quilting, chain strap, and elegant turn-lock closure.",
        details: ["Double flap", "Gold-tone hardware", "Structured silhouette"]
      },
      {
        id: "goyard-saint-louis",
        brand: "Goyard",
        name: "Saint Louis PM Tote",
        price: 79000,
        color: "Green",
        material: "Goyardine canvas",
        image: "",
        summary: "Lightweight reversible tote with removable pouch for everyday errands and travel.",
        details: ["Removable pouch", "Reversible body", "Lightweight construction"]
      },
      {
        id: "lv-alma-bb",
        brand: "Louis Vuitton",
        name: "Alma BB Epi Leather",
        price: 112000,
        color: "Rose Ballerine",
        material: "Epi grained leather",
        image: "",
        summary: "Compact structured top-handle bag with refined curves and detachable strap.",
        details: ["Top handles", "Padlock detail", "Crossbody strap"]
      }
    ];

    const navItems = [
      ["/", "Home"],
      ["/shop", "Shop"],
      ["/wishlist", "Wishlist"],
      ["/cart", "Cart"],
      ["/checkout", "Checkout"]
    ];

    let state = loadState();

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        return { cart: saved.cart || {}, wishlist: saved.wishlist || [] };
      } catch (error) {
        return { cart: {}, wishlist: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      updateBadges();
    }

    function money(value) {
      return new Intl.NumberFormat("th-TH", { style: "currency", currency: "THB", maximumFractionDigits: 0 }).format(value);
    }

    function getProduct(id) { return products.find(product => product.id === id); }
    function cartItems() {
      return Object.entries(state.cart)
        .map(([id, qty]) => ({ product: getProduct(id), qty }))
        .filter(item => item.product && item.qty > 0);
    }
    function cartTotal() { return cartItems().reduce((sum, item) => sum + item.product.price * item.qty, 0); }
    function cartCount() { return cartItems().reduce((sum, item) => sum + item.qty, 0); }

    function route() {
      const hash = window.location.hash || "#/";
      const clean = hash.replace(/^#/, "") || "/";
      const parts = clean.split("?")[0].split("/").filter(Boolean);
      return { path: clean, parts };
    }

    function setRoute(path) {
      window.location.hash = path;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char]));
    }

    function productArt(product, large = false) {
      const label = `${product.brand}\n${product.name}`;
      if (product.image) {
        return `<div class="product-art${large ? " large" : ""}"><img src="${product.image}" alt="${escapeHtml(product.name)}" onerror="this.remove(); this.parentElement.textContent='${escapeHtml(label)}';"></div>`;
      }
      return `<div class="product-art${large ? " large" : ""}">${escapeHtml(label)}</div>`;
    }

    function renderNav() {
      const current = route().path;
      document.getElementById("navLinks").innerHTML = navItems.map(([path, label]) => {
        const active = current === path || (path !== "/" && current.startsWith(path));
        return `<a class="${active ? "active" : ""}" href="#${path}">${label}</a>`;
      }).join("");
      updateBadges();
    }

    function updateBadges() {
      document.getElementById("cartCount").textContent = cartCount();
      document.getElementById("wishCount").textContent = state.wishlist.length;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function addToCart(id, qty = 1) {
      state.cart[id] = (state.cart[id] || 0) + qty;
      saveState();
      showToast("เพิ่มสินค้าเข้าตะกร้าแล้ว");
    }

    function setQty(id, qty) {
      if (qty <= 0) delete state.cart[id];
      else state.cart[id] = qty;
      saveState();
      render();
    }

    function toggleWishlist(id) {
      state.wishlist = state.wishlist.includes(id)
        ? state.wishlist.filter(item => item !== id)
        : [...state.wishlist, id];
      saveState();
      render();
    }

function productCard(product) {
      const wished = state.wishlist.includes(product.id);
      return `<article class="product-card">
        <a href="#/product/${product.id}">${productArt(product)}</a>
        <div class="product-body">
          <div class="meta">${escapeHtml(product.brand)}</div>
          <h3><a href="#/product/${product.id}">${escapeHtml(product.name)}</a></h3>
          <p>${escapeHtml(product.summary)}</p>
          <div class="tag-row"><span class="tag">${escapeHtml(product.color)}</span><span class="tag">${escapeHtml(product.material)}</span></div>
          <div class="price">${money(product.price)}</div>
          <div class="row-actions">
            <button class="primary" data-add="${product.id}">Add to cart</button>
            <button class="secondary" data-wish="${product.id}">${wished ? "Remove wishlist" : "Wishlist"}</button>
          </div>
        </div>
      </article>`;
    }

   function homeView() {
      const brands = [...new Set(products.map(product => product.brand))];
      return `<div class="wrap">
        <section class="hero">
          <div class="hero-copy">
            <div class="eyebrow">Ready-to-order luxury bags</div>
            <h1>Luxury Bags Collection</h1>
            <p class="lead">เลือกกระเป๋าแบรนด์ดัง ใส่ตะกร้า แล้วส่งออเดอร์ผ่าน LINE เพื่อให้ร้านติดต่อกลับและปิดการขายได้ทันที.</p>
            <div class="hero-buttons">
              <a class="primary" href="#/shop">Shop collection</a>
              <a class="secondary" href="#/checkout">Checkout via LINE</a>
            </div>
          </div>
          <a class="hero-media" href="#/product/lv-trunk-pm"><img src="./images/products/louis-vuitton/lv-trunk-bag.jpg" alt="Louis Vuitton Trunk Bag"></a>
        </section>
        <section>
          <div class="section-head"><div><h2>Featured Brands</h2><p>แบรนด์หลักที่ลูกค้าค้นหาได้เร็ว พร้อมสินค้าตัวอย่างสำหรับเริ่มใช้งานทันที.</p></div></div>
          <div class="brand-grid">${brands.map(brand => `<button class="brand-tile" data-brand="${brand}"><strong>${brand}</strong><span>View collection</span></button>`).join("")}</div>
        </section>
        <section>
          <div class="section-head"><div><h2>Featured Products</h2><p>ชุดสินค้าตัวอย่างพร้อม flow สั่งซื้อจริงผ่าน LINE.</p></div><a class="secondary" href="#/shop">View all</a></div>
          <div class="product-grid">${products.slice(0, 3).map(productCard).join("")}</div>
        </section>
      </div>`;
    }

    function shopView() {
      const params = new URLSearchParams((route().path.split("?")[1] || ""));
      const brand = params.get("brand") || "all";
      const query = (params.get("q") || "").toLowerCase();
      const filtered = products.filter(product => {
        const matchBrand = brand === "all" || product.brand === brand;
        const haystack = `${product.brand} ${product.name} ${product.summary}`.toLowerCase();
        return matchBrand && haystack.includes(query);
      });
      const brands = ["all", ...new Set(products.map(product => product.brand))];
      return `<div class="wrap">
        <div class="section-head"><div><h2>Shop</h2><p>ค้นหา กรองแบรนด์ แล้วเพิ่มสินค้าเข้าตะกร้าได้จากหน้านี้.</p></div></div>
        <div class="filters">
          <input id="searchBox" type="search" placeholder="Search bags or brands" value="${escapeHtml(query)}">
          <select id="brandFilter">${brands.map(item => `<option value="${item}" ${item === brand ? "selected" : ""}>${item === "all" ? "All brands" : item}</option>`).join("")}</select>
        </div>
        <div class="product-grid">${filtered.length ? filtered.map(productCard).join("") : `<div class="panel empty">ไม่พบสินค้า</div>`}</div>
      </div>`;
    }

    function detailView(id) {
      const product = getProduct(id) || products[0];
      const wished = state.wishlist.includes(product.id);
      return `<div class="wrap">
        <p class="meta"><a href="#/shop">Shop</a> / ${escapeHtml(product.brand)}</p>
        <section class="detail">
          ${productArt(product, true)}
          <div class="detail-info">
            <div><div class="eyebrow">${escapeHtml(product.brand)}</div><h1>${escapeHtml(product.name)}</h1></div>
            <p class="lead">${escapeHtml(product.summary)}</p>
            <div class="price">${money(product.price)}</div>
            <div class="specs">
              <div><span>Color</span><strong>${escapeHtml(product.color)}</strong></div>
              <div><span>Material</span><strong>${escapeHtml(product.material)}</strong></div>
              <div><span>Ordering</span><strong>LINE checkout</strong></div>
              <div><span>Availability</span><strong>Sample stock</strong></div>
            </div>
            <div class="panel"><h3>Details</h3><ul>${product.details.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>
            <div class="row-actions">
              <button class="primary" data-add="${product.id}">Add to cart</button>
              <button class="secondary" data-wish="${product.id}">${wished ? "Remove wishlist" : "Add to wishlist"}</button>
              <a class="secondary" href="#/checkout">Checkout</a>
            </div>
          </div>
        </section>
      </div>`;
    }

function wishlistView() {
      const wished = state.wishlist.map(getProduct).filter(Boolean);
      return `<div class="wrap">
        <div class="section-head"><div><h2>Wishlist</h2><p>รายการที่ลูกค้าสนใจ เก็บไว้ใน browser นี้และยังอยู่หลัง refresh.</p></div></div>
        ${wished.length ? `<div class="product-grid">${wished.map(productCard).join("")}</div>` : `<div class="panel empty">ยังไม่มีสินค้าใน wishlist <br><br><a class="primary" href="#/shop">เลือกสินค้า</a></div>`}
      </div>`;
    }

    function cartView() {
      const items = cartItems();
      return `<div class="wrap">
        <div class="section-head"><div><h2>Cart</h2><p>ปรับจำนวนสินค้าแล้วไป checkout เพื่อส่งออเดอร์ผ่าน LINE.</p></div></div>
        ${items.length ? `<div class="checkout-grid"><div class="cart-list">${items.map(({product, qty}) => `<div class="cart-row">
          ${productArt(product)}
          <div><div class="meta">${escapeHtml(product.brand)}</div><h3>${escapeHtml(product.name)}</h3><div class="price">${money(product.price)}</div></div>
          <div class="row-actions"><div class="qty"><button data-qty="${product.id}" data-delta="-1">-</button><strong>${qty}</strong><button data-qty="${product.id}" data-delta="1">+</button></div><button class="danger" data-remove="${product.id}">Remove</button></div>
        </div>`).join("")}</div>${summaryBox(`<a class="primary" href="#/checkout">Proceed to checkout</a>`)}</div>` : `<div class="panel empty">ตะกร้ายังว่าง <br><br><a class="primary" href="#/shop">เลือกสินค้า</a></div>`}
      </div>`;
    }

    function summaryBox(extra = "") {
      const items = cartItems();
      return `<aside class="summary-box"><h3>Order Summary</h3>${items.map(({product, qty}) => `<div class="summary-line"><span>${escapeHtml(product.name)} x ${qty}</span><strong>${money(product.price * qty)}</strong></div>`).join("")}<div class="summary-line"><span>Total</span><strong>${money(cartTotal())}</strong></div><br>${extra}</aside>`;
    }

    function checkoutView() {
      const items = cartItems();
      return `<div class="wrap">
        <div class="section-head"><div><h2>Checkout</h2><p>กรอกข้อมูลลูกค้า ระบบจะสร้างข้อความออเดอร์และเปิด LINE ให้ส่งหาร้าน.</p></div></div>
        ${items.length ? `<div class="checkout-grid">
          <section class="form-box"><form class="form" id="checkoutForm">
            <div class="field"><label for="customerName">Name</label><input id="customerName" required placeholder="ชื่อลูกค้า"></div>
            <div class="field"><label for="customerPhone">Phone</label><input id="customerPhone" required inputmode="tel" placeholder="เบอร์โทร"></div>
            <div class="field"><label for="customerAddress">Address</label><textarea id="customerAddress" required placeholder="ที่อยู่จัดส่ง"></textarea></div>
            <div class="field"><label for="customerNote">Note</label><textarea id="customerNote" placeholder="สี/รุ่น/เวลาติดต่อ หรือรายละเอียดเพิ่มเติม"></textarea></div>
            <button class="primary" type="submit">Send order to LINE</button>
            <p class="meta">LINE target is currently a placeholder. Replace LINE_TARGET_URL or LINE_ID in index.html before real launch.</p>
          </form></section>
          ${summaryBox()}
        </div>` : `<div class="panel empty">ไม่มีสินค้าในตะกร้า <br><br><a class="primary" href="#/shop">เลือกสินค้า</a></div>`}
      </div>`;
    }

    function notFoundView() {
      return `<div class="wrap"><div class="panel empty"><h2>Page not found</h2><p>กลับไปเลือกสินค้าได้ที่หน้าร้าน</p><br><a class="primary" href="#/shop">Go to shop</a></div></div>`;
    }

    function buildLineMessage(form) {
      const items = cartItems();
      const lines = [
        "New order from Luxury Bags Collection",
        "",
        ...items.map(({product, qty}) => `- ${product.brand} ${product.name} x ${qty}: ${money(product.price * qty)}`),
        "",
        `Total: ${money(cartTotal())}`,
        "",
        `Name: ${form.customerName.value.trim()}`,
        `Phone: ${form.customerPhone.value.trim()}`,
        `Address: ${form.customerAddress.value.trim()}`,
        `Note: ${form.customerNote.value.trim() || "-"}`
      ];
      return lines.join("\n");
    }
   unction lineUrl(message) {
      const encoded = encodeURIComponent(message);
      if (LINE_TARGET_URL) {
        return `${LINE_TARGET_URL}${LINE_TARGET_URL.includes("?") ? "&" : "?"}text=${encoded}`;
      }
      if (LINE_ID && LINE_ID !== "ใส่ภายหลัง") {
        return `https://line.me/R/ti/p/~${encodeURIComponent(LINE_ID)}?text=${encoded}`;
      }
      return `https://line.me/R/share?text=${encoded}`;
    }

    function bindEvents() {
      document.querySelectorAll("[data-add]").forEach(button => button.addEventListener("click", () => addToCart(button.dataset.add)));
      document.querySelectorAll("[data-wish]").forEach(button => button.addEventListener("click", () => toggleWishlist(button.dataset.wish)));
      document.querySelectorAll("[data-remove]").forEach(button => button.addEventListener("click", () => setQty(button.dataset.remove, 0)));
      document.querySelectorAll("[data-qty]").forEach(button => button.addEventListener("click", () => {
        const id = button.dataset.qty;
        setQty(id, (state.cart[id] || 0) + Number(button.dataset.delta));
      }));
      document.querySelectorAll("[data-brand]").forEach(button => button.addEventListener("click", () => setRoute(`/shop?brand=${encodeURIComponent(button.dataset.brand)}`)));

      const searchBox = document.getElementById("searchBox");
      const brandFilter = document.getElementById("brandFilter");
      if (searchBox && brandFilter) {
        const applyFilters = () => {
          const params = new URLSearchParams();
          if (brandFilter.value !== "all") params.set("brand", brandFilter.value);
          if (searchBox.value.trim()) params.set("q", searchBox.value.trim());
          setRoute(`/shop${params.toString() ? `?${params}` : ""}`);
        };
        brandFilter.addEventListener("change", applyFilters);
        searchBox.addEventListener("keydown", event => { if (event.key === "Enter") applyFilters(); });
      }

      const form = document.getElementById("checkoutForm");
      if (form) {
        form.addEventListener("submit", event => {
          event.preventDefault();
          if (!cartItems().length) return;
          const url = lineUrl(buildLineMessage(form));
          window.open(url, "_blank", "noopener,noreferrer");
          showToast("สร้างข้อความออเดอร์สำหรับ LINE แล้ว");
        });
      }
    }

 function render() {
      renderNav();
      const { parts } = route();
      const [first, second] = parts;
      let html;
      if (!first) html = homeView();
      else if (first === "shop") html = shopView();
      else if (first === "product") html = detailView(second);
      else if (first === "wishlist") html = wishlistView();
      else if (first === "cart") html = cartView();
      else if (first === "checkout") html = checkoutView();
      else html = notFoundView();
      document.getElementById("app").innerHTML = html;
      bindEvents();
      updateBadges();
      window.scrollTo({ top: 0, behavior: "instant" });
    }

    window.addEventListener("hashchange", render);
    if (!window.location.hash) window.location.hash = "#/";
    render();
